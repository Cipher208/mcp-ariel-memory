name: Detect Secrets

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - run: pip install detect-secrets
      - name: Scan for secrets
        run: detect-secrets scan --all-files --exclude-files '\.env$' --exclude-files 'CHANGELOG\.md$' --exclude-files 'config\.yaml$' --exclude-files '\.txt$' --exclude-files '\.mypy_cache' --exclude-files '\.pytest_cache' --exclude-files '__pycache__' --exclude-files '\.secrets\.baseline$' > .secrets.baseline
      - name: Check results
        run: |
          python -c "
          import json
          d = json.load(open('.secrets.baseline'))
          count = len(d.get('results', {}))
          print(f'Found {count} potential secrets')
          if count > 0:
              for plugin, instances in d['results'].items():
                  for inst in instances:
                      print(f'  {inst[\"filename\"]}:{inst[\"line_number\"]} ({plugin})')
              exit(1)
          print('No secrets found.')
          "
