name: Detect Secrets

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install detect-secrets
      - run: detect-secrets scan --all-files --exclude-files '\.env$' --exclude-files 'CHANGELOG\.md$' --exclude-files 'config\.yaml$' --exclude-files '\.txt$'
      - name: Check for new secrets
        run: |
          RESULT=$(detect-secrets scan --all-files --exclude-files '\.env$' --exclude-files 'CHANGELOG\.md$' --exclude-files 'config\.yaml$' --exclude-files '\.txt$' --output -)
          NEW_SECRETS=$(echo "$RESULT" | python -c "import sys,json; d=json.load(sys.stdin); print(len(d.get('results',{})))")
          if [ "$NEW_SECRETS" -gt 0 ]; then
            echo "Found $NEW_SECRETS potential secrets!"
            detect-secrets scan --all-files --exclude-files '\.env$' --exclude-files 'CHANGELOG\.md$' --exclude-files 'config\.yaml$' --exclude-files '\.txt$'
            exit 1
          fi
          echo "No secrets found."
