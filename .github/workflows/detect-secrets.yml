name: Detect Secrets

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  detect-secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install detect-secrets
      - name: Scan for secrets
        run: |
          detect-secrets scan --all-files \
            --exclude-files '\.env$' \
            --exclude-files 'CHANGELOG\.md$' \
            --exclude-files 'config\.yaml$' \
            --exclude-files '\.txt$' \
            --exclude-files '\.mypy_cache' \
            --exclude-files '\.pytest_cache' \
            --exclude-files '__pycache__' \
            > .secrets.baseline
      - name: Check results
        run: |
          RESULTS=$(python -c "import json; d=json.load(open('.secrets.baseline')); print(len(d.get('results',{})))")
          echo "Found $RESULTS potential secrets"
          if [ "$RESULTS" -gt 0 ]; then
            cat .secrets.baseline
            exit 1
          fi
