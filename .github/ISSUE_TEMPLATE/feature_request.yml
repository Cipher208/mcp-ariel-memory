name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe what you'd like.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this feature solve? Is it related to a frustration?"
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Memory (L1-L4)
        - RAG / Search
        - Wiki
        - Knowledge Graphs
        - Hooks / Lifecycle
        - Authentication / Security
        - MCP Tools
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, mockups, or examples
