project_name = ""
scan_dirs = [
  "src", "lib", "app", "models", "controllers", "services",
  "db", "migrations", "schema", "core", "extended", "features",
  "graph", "hooks", "lifecycle", "rag", "shared", "wiki",
  "adapters", "agent_core", "ariel", "delegation", "memory",
  "modules", "reflex_flags", "skills", "tools", "cognitive",
  "tests", "scripts", "config",
]
extensions = [
  ".py", ".js", ".ts", ".tsx", ".jsx", ".rb", ".go", ".rs",
  ".java", ".cs", ".c", ".cpp", ".h", ".hpp", ".sql", ".yaml",
  ".yml", ".json", ".toml", ".proto", ".graphql",
]
ignore_patterns = [
  "node_modules", "venv", ".git", "__pycache__", ".idea",
  "dist", "build", "target", "vendor", ".pytest_cache",
  "*.min.js", "*.min.css", "*.map", ".ai-memory", ".codegraph",
]
output_format = "markdown"
max_context_tokens = 4000
